name: Monitor 31sumai X2121

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch page and check for changes
        id: check
        run: |
          curl -s --max-time 30 --retry 2 --retry-delay 5 \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: ja,en-US;q=0.7,en;q=0.3" \
            -H "Accept-Encoding: gzip, deflate, br" \
            -L \
            "https://www.31sumai.com/attend/X2121/" -o current_raw.html

          # Check if we got a valid response
          if [ ! -s current_raw.html ]; then
            echo "Failed to fetch page — skipping this run."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          cat current_raw.html \
            | sed 's/<[^>]*>//g' \
            | sed '/^[[:space:]]*$/d' \
            | sed 's/^[[:space:]]*//' \
            > current.txt

          if [ ! -f snapshot.txt ]; then
            echo "First run — saving snapshot."
            cp current.txt snapshot.txt
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            if diff -q snapshot.txt current.txt > /dev/null 2>&1; then
              echo "No changes detected."
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "Changes detected!"
              diff snapshot.txt current.txt > diff_output.txt || true
              cp current.txt snapshot.txt
              echo "changed=true" >> $GITHUB_OUTPUT
              DIFF_CONTENT=$(head -50 diff_output.txt)
              echo "diff_content<<EOF" >> $GITHUB_OUTPUT
              echo "$DIFF_CONTENT" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot.txt
          git diff --staged --quiet || git commit -m "Update snapshot $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Send email notification
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Site Monitor <onboarding@resend.dev>\",
              \"to\": \"uhi_fifa@hotmail.com\",
              \"subject\": \"【変更検知】31sumai.com/attend/X2121\",
              \"html\": \"<h2>ページに変更がありました</h2><p><strong>URL:</strong> <a href='https://www.31sumai.com/attend/X2121/'>https://www.31sumai.com/attend/X2121/</a></p><p><strong>検知時刻:</strong> $(date -u '+%Y-%m-%d %H:%M UTC')</p><p>変更内容を確認してください。</p>\"
            }"
